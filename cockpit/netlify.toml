[build]
  command = "npm run build"
  publish = "dist"

# Proxy para o webhook do n8n (evita CORS) - mesmo path do .env
[[redirects]]
  from = "/webhook/*"
  to = "https://patrimonium-n8n.cloudfy.live/webhook/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
